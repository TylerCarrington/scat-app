name: Publish Android App

on:
  workflow_dispatch:
    inputs:
      build_id:
        description: 'EAS Build ID to submit (optional, uses latest if not provided)'
        required: false
        type: string

jobs:
  submit:
    name: Submit to Google Play
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Setup Expo
        uses: expo/expo-github-action@v8
        with:
          expo-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Create Google Service Account Key
        run: echo '${{ secrets.GOOGLE_SERVICE_ACCOUNT_KEY }}' > google-service-account-key.json

      - name: Submit Android app to Google Play
        run: |
          if [ -n "${{ github.event.inputs.build_id }}" ]; then
            eas submit --platform android --profile production --id ${{ github.event.inputs.build_id }}
          else
            eas submit --platform android --profile production
          fi